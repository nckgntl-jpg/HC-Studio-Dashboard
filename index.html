function parseDateShared(s) {
  if (!s) return null;
  if (s instanceof Date) return s;
  if (typeof s !== 'string') return null;
  var clean = s.replace(/\s*\([^)]*\)/g, '').replace(/(\d+\/\d+)-\d+(\/\d+)/, '$1$2').trim();
  var pts = clean.split('/');
  if (pts.length < 3) return null;
  try {
    var mo = parseInt(pts[0]), dy = parseInt(pts[1]);
    var yr = pts[2].length === 2 ? 2000 + parseInt(pts[2]) : parseInt(pts[2]);
    return new Date(yr, mo - 1, dy);
  } catch(e) { return null; }
}

function computePace(p) {
  if (!p.contract || !p.fees_used || !p.milestones) return null;
  var today = new Date();
  var dateRe = /(\d{1,2}\/\d{1,2}(?:-\d+)?\/\d{2,4})/g;
  var allDates = [], dm;
  while ((dm = dateRe.exec(p.milestones)) !== null) {
    var pd = parseDateShared(dm[1]);
    if (pd) allDates.push(pd);
  }
  if (allDates.length < 2) return null;
  var projStart = new Date(Math.min.apply(null, allDates));
  var projEnd   = new Date(Math.max.apply(null, allDates));
  if (today < projStart || today > projEnd) return null;
  var totalDays   = (projEnd - projStart) / 86400000;
  var elapsedDays = (today - projStart) / 86400000;
  var pctElapsed  = elapsedDays / totalDays;
  var anticipated = p.contract * pctElapsed;
  var actual      = p.fees_used || 0;
  var delta       = actual - anticipated;
  var deltaPct    = Math.round((delta / p.contract) * 100);
  return {
    anticipated: Math.round(anticipated), actual: Math.round(actual),
    delta: Math.round(delta), deltaPct: deltaPct,
    pctElapsed: Math.round(pctElapsed * 100)
  };
}

function PaceBadge(props) {

function HoursPanel({totalContract, totalFeesUsed}) {
  if (!totalContract) return <div style={{fontSize:12,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>No fee data for projection</div>;
  const budgeted  = totalContract  / BLENDED_RATE;
  const burned    = (totalFeesUsed||0) / BLENDED_RATE;
  const remaining = budgeted - burned;
  const pct       = Math.min(100, Math.round(burned / budgeted * 100));
  const over      = totalContract && totalFeesUsed && (totalContract / totalFeesUsed) < 0.8;
  const barColor  = over ? "#e07b6a" : pct >= 85 ? "#e8b84b" : "#7eb8c9";
  // Velocity: if we know % fee used we can project total hours at completion
  const projected = totalFeesUsed ? (burned / (totalFeesUsed / totalContract)) : budgeted;
  return (
    <div>

          ["Budgeted",   fmtH(budgeted),  "rgba(255,255,255,0.5)"],
          ["Burned",     fmtH(burned),    barColor],

  return <div title={name} style={{width:size,height:size,borderRadius:"50%",background:color+"22",border:`1.5px solid ${color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.38,fontWeight:600,color,fontFamily:"'DM Mono',monospace",flexShrink:0}}>{name[0]}</div>;
}

function Badge({status}) {
  const cfg = STATUS_CFG[status]||{color:"#aaa",bg:"rgba(170,170,170,0.1)"};
  return <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:500,color:cfg.color,background:cfg.bg,padding:"3px 8px",borderRadius:4,whiteSpace:"nowrap"}}>{status}</span>;

function StatCard({label,value,sub,accent}) {
  return (
    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"16px 18px"}}>

function PhaseBar({fee, used, done, label, color}) {
  if (!fee) return null;
  const pct = Math.min(100, Math.round((used||0)/fee*100));
  const over = fee && used && (fee / used) < 0.8;
  const barColor = over ? "#e07b6a" : color;
  const budgetedH = Math.round(fee / BLENDED_RATE);
  const burnedH   = Math.round((used||0) / BLENDED_RATE);
  const diffH     = budgetedH - burnedH;
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.4)"}}>{label}</span>
          {done && <span style={{fontSize:9,color:"#4caf7d",fontFamily:"'DM Mono',monospace"}}>✓</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {over && <span style={{fontSize:9,color:"#e07b6a",fontFamily:"'DM Mono',monospace"}}>OVER</span>}
          <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:barColor}}>{fmt$(used)} / {fmt$(fee)}</span>
        </div>
      </div>
      <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:4,overflow:"hidden",marginBottom:3}}>
        <div style={{width:`${pct}%`,height:"100%",background:barColor,borderRadius:99}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.2)"}}>{burnedH}h / {budgetedH}h</span>
        <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:over?"#e07b6a":diffH<=budgetedH*0.15?"#e8b84b":"rgba(255,255,255,0.2)"}}>{over?`+${Math.abs(diffH)}h over`:`${diffH}h left`}</span>
      </div>
    </div>
  );
}

function FeeDonut({totalContract, totalFeesUsed}) {
  if (!totalContract) return null;
  const pct = Math.min(100, Math.round((totalFeesUsed||0)/totalContract*100));
  const over = totalContract && totalFeesUsed && (totalContract / totalFeesUsed) < 0.8;
  const color = over ? "#e07b6a" : pct >= 85 ? "#e8b84b" : "#4caf7d";
  const r = 20, circ = 2*Math.PI*r, dash = (pct/100)*circ;
  return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <svg width={50} height={50} style={{transform:"rotate(-90deg)"}}>
        <circle cx={25} cy={25} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={5}/>
        <circle cx={25} cy={25} r={r} fill="none" stroke={color} strokeWidth={5} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div>
        <div style={{fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color,lineHeight:1}}>{pct}%</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'DM Mono',monospace"}}>{over?"over budget":"fee used"}</div>
      </div>
    </div>
  );
}

function MilestoneTimeline({milestones}) {
  if (!milestones || !milestones.trim()) return null;
  const fmtD = d => d instanceof Date ? d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}) : '';
  const parseDate = s => {
    if (!s) return null;
    if (s instanceof Date) return s;
    if (typeof s !== 'string') return null;
    s = s.replace(/\s*\([^)]*\)/g,'').replace(/(\d+\/\d+)-\d+(\/\d+)/,'$1$2').trim();
    const pts = s.split('/');
    if (pts.length < 3) return null;
    try { const [mo,d,yr]=pts; return new Date(yr.length===2?'20'+yr:yr, parseInt(mo)-1, parseInt(d)); }
    catch(e) { return null; }
  };
  const labelRe = /\b(SD\/S1|DD\/S2|CD\/S3|CA\/S4|Stage\s*\d+[ab]?|ES|SD|DD|CD|CA|Closeout|ASAF|Permitting)\s*:/gi;
  const dateRe  = /(\d{1,2}\/\d{1,2}(?:-\d+)?\/\d{2,4})/g;
  const labelMatches = [...milestones.matchAll(labelRe)];
  const parsed = labelMatches.map((lm, i) => {
    const label  = lm[1].trim();
    const segEnd = i+1 < labelMatches.length ? labelMatches[i+1].index : milestones.length;
    const seg    = milestones.slice(lm.index + lm[0].length, segEnd);
    const dates  = [...seg.matchAll(dateRe)].map(m => parseDate(m[1])).filter(Boolean);
    return { label, start: dates[0]||null, end: dates[1]||null };
  }).filter(p => p.start || p.end);
  if (!parsed.length) return null;
  const today = new Date();
  const allDates = parsed.flatMap(p => [p.start, p.end]).filter(Boolean);
  const minD = new Date(Math.min(...allDates));
  const maxD = new Date(Math.max(...allDates));
  const span = maxD - minD || 1;
  const posPct = d => d instanceof Date ? Math.min(100, Math.max(0, ((d-minD)/span)*100)) : null;
  const todayPct = posPct(today);
  const SC = {"SD/S1":"#c8a96e","DD/S2":"#9e7ec8","CD/S3":"#e8b84b","CA/S4":"#4caf7d","Stage 1":"#7eb8c9","Stage 2":"#c8a96e","Stage 3":"#e8b84b","Stage 3a":"#e8b84b","Stage 3b":"#d4a030","Stage 4":"#4caf7d","Stage 4a":"#4caf7d","Stage 4b":"#68c99a","CA":"#4caf7d","CD":"#9e7ec8","SD":"#c8a96e","Closeout":"#b0c87e"};
  return (
    <div style={{marginTop:16}}>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:12}}>Phase Schedule</div>
      <div style={{position:"relative",height:6,background:"rgba(255,255,255,0.06)",borderRadius:99,marginBottom:20}}>
        {parsed.map((p,i) => {
          if (!p.start) return null;
          const l=posPct(p.start), w=p.end?posPct(p.end)-l:2, c=SC[p.label]||"#aaa", ia=p.start<=today&&p.end&&today<=p.end;
          return <div key={i} title={p.label+': '+fmtD(p.start)+(p.end?' - '+fmtD(p.end):'')} style={{position:"absolute",left:l+"%",width:Math.max(2,w)+"%",height:"100%",background:c,borderRadius:99,opacity:ia?1:0.55}}/>;
        })}
        {todayPct>=0&&todayPct<=100&&(
          <div style={{position:"absolute",left:todayPct+"%",top:-4,width:2,height:14,background:"rgba(255,255,255,0.7)",borderRadius:1,transform:"translateX(-50%)"}}>
            <div style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",fontSize:8,color:"rgba(255,255,255,0.5)",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>today</div>
          </div>
        )}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {parsed.map((p,i) => {
          if (!p.start) return null;
          const c=SC[p.label]||"#aaa", isPast=p.end&&today>p.end, isActive=p.start<=today&&p.end&&today<=p.end;
          return (
            <div key={i} style={{display:"grid",gridTemplateColumns:"70px 1fr",gap:6,alignItems:"center"}}>
              <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:isActive?c:isPast?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.4)",fontWeight:isActive?600:400}}>{p.label}</span>
              <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.3)"}}>{fmtD(p.start)}{p.end?" – "+fmtD(p.end):""}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function getPhaseBarsGantt(milestones) {
  if (!milestones) return [];
  var labelRe = /\b(SD\/S1|DD\/S2|CD\/S3|CA\/S4|Stage\s*\d+[ab]?|ES|SD|DD|CD|CA|Closeout|ASAF|Permitting)\s*:/gi;
  var matches = [];
  var m;
  while ((m = labelRe.exec(milestones)) !== null) {
    matches.push({ label: m[1].trim(), index: m.index, len: m[0].length });
  }
  return matches.map(function(lm, i) {
    var segEnd = i + 1 < matches.length ? matches[i + 1].index : milestones.length;
    var seg = milestones.slice(lm.index + lm.len, segEnd);
    var dates = [];
    var dm;
    var dRe = /(\d{1,2}\/\d{1,2}(?:-\d+)?\/\d{2,4})/g;
    while ((dm = dRe.exec(seg)) !== null) {
      var pd = parseDateShared(dm[1]);
      if (pd) dates.push(pd);
    }
    return { label: lm.label, start: dates[0] || null, end: dates[1] || dates[0] || null };
  }).filter(function(b) { return b.start; });
}

var GANTT_PHASE_CLR = {
  "SD/S1": "#c8a96e", "DD/S2": "#9e7ec8", "CD/S3": "#e8b84b", "CA/S4": "#4caf7d",
  "Stage 1": "#7eb8c9", "Stage 2": "#c8a96e",
  "Stage 3": "#e8b84b", "Stage 3a": "#e8b84b", "Stage 3b": "#d4a030",
  "Stage 4": "#4caf7d", "Stage 4a": "#4caf7d", "Stage 4b": "#68c99a",
  "SD": "#c8a96e", "DD": "#9e7ec8", "CD": "#9e7ec8", "CA": "#4caf7d",
  "Closeout": "#b0c87e", "ASAF": "#e07b6a", "Permitting": "#7ec8b8",
};

function CalendarView(props) {
  var projects = props.projects;
  var today = new Date();
  var rangeState = React.useState('max');
  var range = rangeState[0];
  var setRange = rangeState[1];

  var entries = React.useMemo(function() {
    return projects.map(function(p) {
      var bars = getPhaseBarsGantt(p.milestones);
      var allD = bars.reduce(function(acc, b) {
        if (b.start) acc.push(b.start);
        if (b.end) acc.push(b.end);
        return acc;
      }, []);
      var start = allD.length ? new Date(Math.min.apply(null, allD)) : null;
      var end   = allD.length ? new Date(Math.max.apply(null, allD)) : null;
      return { id: p.id, name: p.name, client: p.client, active: p.active,
               contract: p.contract, fees_used: p.fees_used, hourly: p.hourly,
               bars: bars, start: start, end: end };
    }).filter(function(p) { return p.start; });
  }, [projects]);

  // Compute the full data extent for "max"
  var dataMinRaw = entries.reduce(function(mn, p) {
    return p.start && p.start < mn ? p.start : mn;
  }, today);
  var dataMaxRaw = entries.reduce(function(mx, p) {
    return p.end && p.end > mx ? p.end : mx;
  }, today);
  var dataMax = new Date(dataMaxRaw.getFullYear(), dataMaxRaw.getMonth() + 2, 1);
  // Apply range filter
  var minDate, maxDate;
  if (range === 'max') {
    minDate = new Date(dataMinRaw.getFullYear(), dataMinRaw.getMonth(), 1);
    maxDate = dataMax;
  } else {
    var months = range === '1m' ? 1 : range === '3m' ? 3 : range === '6m' ? 6 : 12;
    minDate = new Date(today.getFullYear(), today.getMonth(), 1);
    maxDate = new Date(today.getFullYear(), today.getMonth() + months + 1, 1);
  }
  var totalMs = maxDate - minDate || 1;

  function toPct(d) {
    if (!d) return 0;
    return Math.min(100, Math.max(0, (d - minDate) / totalMs * 100));
  }

  var todayPct = toPct(today);

  var months = [];
  var cur = new Date(minDate);
  while (cur < maxDate) {
    months.push(new Date(cur));
    cur.setMonth(cur.getMonth() + 1);
  }

  var groups = {};
  entries.forEach(function(p) {
    var key = p.client;
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });
  var groupList = Object.keys(groups).sort().map(function(k) {
    return { name: k, projects: groups[k] };
  });

  var LW = 220;

  return (
    <div style={{fontFamily:"'DM Mono',monospace"}}>
      <div style={{display:"flex",gap:14,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        {Object.keys(GANTT_PHASE_CLR).filter(function(k,i){ return i < 9; }).map(function(label) {
          return (
            <div key={label} style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:12,height:5,borderRadius:3,background:GANTT_PHASE_CLR[label]}}/>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.4)"}}>{label}</span>
            </div>
          );
        })}
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:1,height:12,background:"rgba(255,255,255,0.5)"}}/>
          <span style={{fontSize:9,color:"rgba(255,255,255,0.4)"}}>Today</span>
        </div>
        <div style={{display:"flex",background:"rgba(255,255,255,0.05)",borderRadius:8,padding:3,gap:2,marginLeft:"auto"}}>
          {["1m","3m","6m","12m","max"].map(function(r) {
            return (
              <button key={r} onClick={function(){ setRange(r); }}
                style={{padding:"3px 10px",borderRadius:5,border:"none",cursor:"pointer",
                  background:range===r?"rgba(200,169,110,0.25)":"transparent",
                  color:range===r?"#c8a96e":"rgba(255,255,255,0.35)",
                  fontSize:10,fontFamily:"'DM Mono',monospace",transition:"all 0.15s"}}>
                {r}
              </button>
            );
          })}
        </div>
        <span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>
          {entries.length} projects
        </span>
      </div>
      <div style={{overflowX:"auto"}}>
        <div style={{minWidth:900}}>
          <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.08)",marginBottom:4,paddingBottom:4}}>
            <div style={{width:LW,flexShrink:0}}/>
            <div style={{flex:1,position:"relative",height:20}}>
              {months.map(function(mn, i) {
                // Skip labels to avoid crowding: every month for ≤6m, every 2 for ≤12m, every 3 for max
                var step = range === '1m' || range === '3m' || range === '6m' ? 1 : range === '12m' ? 2 : 3;
                if (i % step !== 0) return null;
                // For max/12m, show month+year only on Jan or first label; others show month only
                var isJan = mn.getMonth() === 0;
                var showYear = range === 'max' || range === '12m';
                var label = showYear && (isJan || i === 0)
                  ? mn.toLocaleDateString("en-US",{month:"short",year:"numeric"})
                  : mn.toLocaleDateString("en-US",{month:"short"});
                return (
                  <div key={i} style={{position:"absolute",left:toPct(mn)+"%",fontSize:9,
                    color:isJan && showYear?"rgba(255,255,255,0.55)":"rgba(255,255,255,0.3)",
                    borderLeft:"1px solid rgba(255,255,255,"+(isJan && showYear?"0.15":"0.06")+")",
                    paddingLeft:3,top:3,whiteSpace:"nowrap",fontWeight:isJan && showYear?600:400}}>
                    {label}
                  </div>
                );
              })}
              {todayPct >= 0 && todayPct <= 100 && (
                <div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,width:1,background:"rgba(255,255,255,0.5)"}}/>
              )}
            </div>
          </div>
          {groupList.map(function(group) {
            return (
              <div key={group.name} style={{marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",marginBottom:2,paddingTop:6}}>
                  <div style={{width:LW,flexShrink:0}}>
                    <span style={{fontSize:10,fontWeight:600,
                      color:CLIENT_COLORS[group.name]||"#c8a96e",
                      letterSpacing:"0.08em",textTransform:"uppercase"}}>
                      {group.name}
                    </span>
                  </div>
                  <div style={{flex:1,height:1,background:"rgba(255,255,255,0.06)"}}/>
                </div>
                {group.projects.map(function(p) {
                  var burnPct = p.contract && p.fees_used ? Math.round(p.fees_used / p.contract * 100) : null;
                  var over = p.contract && p.fees_used && (p.contract / p.fees_used) < 0.8;
                  var bc = over ? "#e07b6a" : (burnPct >= 85 ? "#e8b84b" : "#4caf7d");
                  return (
                    <div key={p.id} style={{display:"flex",alignItems:"center",height:26,
                      borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                      <div style={{width:LW,flexShrink:0,paddingRight:10,
                        display:"flex",alignItems:"center",gap:6,overflow:"hidden"}}>
                        <div style={{width:5,height:5,borderRadius:"50%",background:bc,flexShrink:0}}/>
                        <div style={{overflow:"hidden",flex:1}}>
                          <div style={{fontSize:10,color:"rgba(255,255,255,0.75)",
                            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                            {p.name}
                          </div>
                          <div style={{fontSize:8,color:"rgba(255,255,255,0.3)",display:"flex",gap:5,marginTop:1}}>
                            <span>{p.id}</span>
                            {burnPct != null && <span style={{color:bc}}>{burnPct}%{over?" !":""}</span>}
                          </div>
                        </div>
                      </div>
                      <div style={{flex:1,position:"relative",height:"100%"}}>
                        {todayPct >= 0 && todayPct <= 100 && (
                          <div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,
                            width:1,background:"rgba(255,255,255,0.1)",zIndex:2}}/>
                        )}
                        {p.bars.map(function(bar, bi) {
                          var l = toPct(bar.start);
                          var r = bar.end ? toPct(bar.end) : l + 1;
                          var w = Math.max(0.5, r - l);
                          var clr = GANTT_PHASE_CLR[bar.label] || "#6b7280";
                          var isActive = bar.start <= today && bar.end && today <= bar.end;
                          var isPast = bar.end && today > bar.end;
                          var barTitle = bar.label + ": " + (bar.start ? bar.start.toLocaleDateString() : "") + (bar.end ? " to " + bar.end.toLocaleDateString() : "");
                          return (
                            <div key={bi} title={barTitle}
                              style={{position:"absolute",
                                left:l+"%",width:w+"%",
                                top:"50%",transform:"translateY(-50%)",
                                height:isActive?10:6,
                                background:clr,
                                opacity:isPast?0.25:isActive?1:0.65,
                                borderRadius:3,zIndex:1}}/>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('active');
  const [showActive, setShowActive] = useState(true);
  const [search, setSearch]         = useState("");
  const [filterClient, setFC]       = useState("All");
  const [filterPerson, setFP]       = useState("All");
  const [filterConsultant, setFCon] = useState("All");
  const [filterStatus, setFS]       = useState("All");
  const [filterOverBudget, setFOB]  = useState(false);
  const [sortBy, setSort]           = useState("client");
  const [expanded, setExpanded]     = useState(null);

  const pool    = useMemo(()=>ALL_PROJECTS.filter(p=>p.active===showActive),[showActive])
  const overBudgetByRatio = useMemo(()=>ALL_PROJECTS.filter(p=>p.active && p.contract && p.fees_used && !p.hourly && (p.contract/p.fees_used) < 0.8).sort((a,b)=>{
    return (a.contract/a.fees_used) - (b.contract/b.fees_used);
  }),[]);
  const clients = useMemo(()=>["All",...Array.from(new Set(pool.map(p=>p.client))).sort()],[pool]);
  const people      = ["All",...Object.keys(TEAM_COLORS).sort()];
  const consultants = useMemo(()=>["All",...Array.from(new Set(ALL_PROJECTS.flatMap(p=>p.consultants||[]))).sort()],[]);
  const statuses= ["All",...STATUS_ORDER];

  const filtered = useMemo(()=>{
    return pool.filter(p=>{
      const q=search.toLowerCase();
      if(q&&!p.name.toLowerCase().includes(q)&&!p.client.toLowerCase().includes(q)&&!p.id.toLowerCase().includes(q)&&!p.team.some(t=>t.toLowerCase().includes(q))) return false;
      if(filterClient!=="All"&&p.client!==filterClient) return false;
      if(filterPerson!=="All"&&!p.team.includes(filterPerson)) return false;
      if(filterConsultant!=="All"&&!(p.consultants||[]).includes(filterConsultant)) return false;
      if(filterStatus!=="All"&&p.status!==filterStatus) return false;
      if(filterOverBudget&&!(p.contract&&p.fees_used&&p.fees_used>p.contract)) return false;
      return true;
    }).sort((a,b)=>{
      if(sortBy==="client") return a.client.localeCompare(b.client)||a.name.localeCompare(b.name);
      if(sortBy==="status") return STATUS_ORDER.indexOf(a.status)-STATUS_ORDER.indexOf(b.status);
      if(sortBy==="name")   return a.name.localeCompare(b.name);
      if(sortBy==="id")     return a.id.localeCompare(b.id);
      return 0;
    });
  },[pool,search,filterClient,filterPerson,filterConsultant,filterStatus,filterOverBudget,sortBy]);

  const active   = ALL_PROJECTS.filter(p=>p.active);
  const inactive = ALL_PROJECTS.filter(p=>!p.active);
  const inCA     = active.filter(p=>p.status==="CA").length;
  const inCD     = active.filter(p=>p.status==="CD").length;
  const props    = active.filter(p=>["Proposal","Pending","LOD"].includes(p.status)).length;
  const feeP        = active.filter(p=>p.contract||p.fees_used);
  const totalContract  = feeP.reduce((s,p)=>s+(p.hourly ? (p.fees_used||0) : (p.contract||0)),0);
  const totalFeesUsed  = feeP.reduce((s,p)=>s+(p.fees_used||0),0);
  const overBudget  = active.filter(p=>p.contract&&p.fees_used&&!p.hourly&&p.fees_used>p.contract);
  const completedP        = ALL_PROJECTS.filter(p=>!p.active&&(p.contract||p.fees_used));
  const completedContract = completedP.reduce((s,p)=>s+(p.hourly ? (p.fees_used||0) : (p.contract||0)),0);
  const completedFeesUsed = completedP.reduce((s,p)=>s+(p.fees_used||0),0);


  const weeklyChanges = useMemo(() => {
    if (WEEKLY_SNAPSHOTS.length < 2) return {changes:[], prevWeek:'', currWeek:'', totalDelta:0, monthChanges:[], prevMonth:'', totalMonthDelta:0};
    // Most recent snapshot
    const curr = WEEKLY_SNAPSHOTS[WEEKLY_SNAPSHOTS.length - 1];
    const currDate = new Date(curr.week);
    // Find best "previous week" snapshot: latest snapshot >= 6 days ago
    const weekAgo = new Date(currDate); weekAgo.setDate(weekAgo.getDate() - 6);
    const monthAgo = new Date(currDate); monthAgo.setDate(monthAgo.getDate() - 31);
    // Week comparison: closest snapshot that is at least 6 days older
    var weekSnap = null;
    for (var wi = WEEKLY_SNAPSHOTS.length - 2; wi >= 0; wi--) {
      var snapDate = new Date(WEEKLY_SNAPSHOTS[wi].week);
      if (snapDate <= weekAgo) { weekSnap = WEEKLY_SNAPSHOTS[wi]; break; }
    }
    // If no snapshot 6+ days ago, just use the previous one
    if (!weekSnap) weekSnap = WEEKLY_SNAPSHOTS[WEEKLY_SNAPSHOTS.length - 2];
    // Month comparison: closest snapshot that is at least 28 days older
    var monthSnap = null;
    for (var mi = WEEKLY_SNAPSHOTS.length - 2; mi >= 0; mi--) {
      var mSnapDate = new Date(WEEKLY_SNAPSHOTS[mi].week);
      if (mSnapDate <= monthAgo) { monthSnap = WEEKLY_SNAPSHOTS[mi]; break; }
    }
    function computeChanges(prevSnap, currSnap) {
      var prev = prevSnap.projects;
      var currP = currSnap.projects;
      var changes = [];
      Object.keys(currP).forEach(function(pid) {
        var oldVal = prev[pid] || 0;
        var newVal = currP[pid] || 0;
        var delta = newVal - oldVal;
        if (delta <= 0) return;
        var project = ALL_PROJECTS.find(function(p) { return p.id === pid; });
        if (!project) return;
        changes.push({
          id: pid, name: project.name, client: project.client,
          team: project.team, status: project.status, active: project.active,
          contract: project.contract, fees_used: newVal, fees_prev: oldVal,
          delta: delta, hourly: project.hourly,
        });
      });
      return changes.sort(function(a,b){ return b.delta - a.delta; });
    }
    var weekChanges = computeChanges(weekSnap, curr);
    var monthChanges = monthSnap ? computeChanges(monthSnap, curr) : [];
    return {
      changes: weekChanges,
      prevWeek: weekSnap.week,
      currWeek: curr.week,
      totalDelta: weekChanges.reduce(function(s,c){ return s+c.delta; }, 0),
      monthChanges: monthChanges,
      prevMonth: monthSnap ? monthSnap.week : '',
      totalMonthDelta: monthChanges.reduce(function(s,c){ return s+c.delta; }, 0),
    };
  }, []);

  const statusCounts = useMemo(()=>STATUS_ORDER.reduce((a,s)=>{a[s]=pool.filter(p=>p.status===s).length;return a;},{}), [pool]);
  const personLoad   = useMemo(()=>Object.keys(TEAM_COLORS).map(n=>({name:n,count:pool.filter(p=>p.team.includes(n)).length})).sort((a,b)=>b.count-a.count),[pool]);
  const resetFilters = ()=>{setSearch("");setFC("All");setFP("All");setFCon("All");setFS("All");setFOB(false);};

  return (
    <div style={{minHeight:"100vh",background:"#0d0f14",padding:"28px 24px"}}>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:24}}>
        <div>
          <div style={{fontSize:10,letterSpacing:"0.18em",color:"rgba(200,169,110,0.6)",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:4}}>Healthcare Studio</div>
          <h1 style={{fontSize:30,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",letterSpacing:"-0.01em"}}>Project Dashboard</h1>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontFamily:"'DM Mono',monospace"}}>
            {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
          </div>
          <div style={{display:"flex",background:"rgba(255,255,255,0.05)",borderRadius:8,padding:3,gap:3}}>
            {[
              {label:`Active (${active.length})`, v:"active"},
              {label:`Inactive (${inactive.length})`, v:"inactive"},
              {label:`Over Budget (${overBudgetByRatio.length})`, v:"ratio"},
              {label:`This Week (${weeklyChanges.changes ? weeklyChanges.changes.length : 0})`, v:"weekly"},
              {label:`This Month (${weeklyChanges.monthChanges ? weeklyChanges.monthChanges.length : 0})`, v:"monthly"},
              {label:"Calendar", v:"calendar"},
            ].map(t=>(
              <button key={t.v} onClick={()=>{
                setView(t.v);
                if(t.v==="active"){setShowActive(true);resetFilters();}
                else if(t.v==="inactive"){setShowActive(false);resetFilters();}
                else {resetFilters();}
              }} style={{padding:"5px 14px",borderRadius:6,border:"none",
                background:view===t.v?"rgba(200,169,110,0.2)":"transparent",
                color:view===t.v?"#c8a96e":"rgba(255,255,255,0.35)",
                fontSize:11,fontFamily:"'DM Mono',monospace",cursor:"pointer",transition:"all 0.2s"}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {view === "ratio" && (
        <OverBudgetView projects={overBudgetByRatio} />
      )}
      {view === "weekly" && (
        <WeeklyChangesView data={weeklyChanges} period="week" />
      )}
      {view === "calendar" && (
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"20px 24px"}}>
          <CalendarView projects={ALL_PROJECTS.filter(function(p){ return p.active; })} />
        </div>
      )}
      {view === "monthly" && (
        <WeeklyChangesView data={weeklyChanges} period="month" />
      )}
      {view !== "overbudget" && showActive && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          <StatCard label="Active Projects" value={active.length} sub="in studio" accent="#c8a96e"/>
          <StatCard label="Construction Admin" value={inCA} sub={`${Math.round(inCA/active.length*100)}% of portfolio`} accent="#4caf7d"/>
          <StatCard label="In CDs" value={inCD} sub="drawing production" accent="#9e7ec8"/>
          <StatCard label="Proposals / Pending" value={props} sub="awaiting authorization" accent="#7eb8c9"/>
        </div>
      )}


      {showActive && feeP.length > 0 && (
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px 20px",marginBottom:12}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:12}}>Fee Overview</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            {/* Active */}
            <div style={{borderRight:"1px solid rgba(255,255,255,0.06)",paddingRight:16}}>
              <div style={{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",color:"#7eb8c9",marginBottom:8}}>Active — {feeP.length} projects</div>
              <div style={{display:"flex",gap:20,alignItems:"baseline",flexWrap:"wrap",marginBottom:10}}>
                {[["Contracted",totalContract,"#c8a96e"],["Used",totalFeesUsed,"#9e7ec8"],["Remaining",totalContract-totalFeesUsed,totalContract-totalFeesUsed<0?"#e07b6a":"#4caf7d"]].map(([l,v,c])=>(
                  <div key={l}>
                    <div style={{fontSize:20,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:c,lineHeight:1}}>{fmtFull$(v)}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'DM Mono',monospace"}}>burn rate</span>
                <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:totalFeesUsed/totalContract>0.9?"#e07b6a":totalFeesUsed/totalContract>0.75?"#e8b84b":"#4caf7d"}}>{Math.round((totalFeesUsed||0)/(totalContract||1)*100)}%</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.06)",borderRadius:99,height:5,overflow:"hidden",marginBottom:8}}>
                <div style={{width:`${Math.min(100,Math.round((totalFeesUsed||0)/(totalContract||1)*100))}%`,height:"100%",background:"linear-gradient(90deg,#9e7ec8,#c8a96e)",borderRadius:99}}/>
              </div>
              {overBudget.length > 0 && (
                <div style={{background:"rgba(224,123,106,0.1)",border:"1px solid rgba(224,123,106,0.25)",borderRadius:6,padding:"5px 10px"}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#e07b6a"}}>⚠ {overBudget.length} over budget</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:1}}>{overBudget.map(p=>p.id).join(", ")}</div>
                </div>
              )}
            </div>
            {/* Completed */}
            <div style={{paddingLeft:4}}>
              <div style={{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.3)",marginBottom:8}}>Completed — {completedP.length} projects</div>
              <div style={{display:"flex",gap:20,alignItems:"baseline",flexWrap:"wrap",marginBottom:10}}>
                {[["Contracted",completedContract,"#c8a96e"],["Used",completedFeesUsed,"#9e7ec8"],["Variance",completedContract-completedFeesUsed,completedContract-completedFeesUsed<0?"#e07b6a":"#4caf7d"]].map(([l,v,c])=>(
                  <div key={l}>
                    <div style={{fontSize:20,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:c,lineHeight:1}}>{fmtFull$(v)}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'DM Mono',monospace"}}>avg utilization</span>
                <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:completedFeesUsed/completedContract>0.9?"#e07b6a":completedFeesUsed/completedContract>0.75?"#e8b84b":"#4caf7d"}}>{Math.round((completedFeesUsed||0)/(completedContract||1)*100)}%</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.06)",borderRadius:99,height:5,overflow:"hidden"}}>
                <div style={{width:`${Math.min(100,Math.round((completedFeesUsed||0)/(completedContract||1)*100))}%`,height:"100%",background:"linear-gradient(90deg,rgba(158,126,200,0.5),rgba(200,169,110,0.5))",borderRadius:99}}/>
              </div>
            </div>
          </div>
        </div>
      )}




      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px 18px"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:10}}>Projects by Phase</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {STATUS_ORDER.filter(s=>statusCounts[s]>0).map(s=>{
              const cfg=STATUS_CFG[s]||{};
              return <div key={s} onClick={()=>setFS(filterStatus===s?"All":s)} className="chip"
                style={{display:"flex",alignItems:"center",gap:6,background:filterStatus===s?cfg.bg:"rgba(255,255,255,0.04)",border:`1px solid ${filterStatus===s?cfg.color:"rgba(255,255,255,0.08)"}`,borderRadius:8,padding:"4px 10px",cursor:"pointer"}}>
                <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:cfg.color||"#aaa"}}>{s}</span>
                <span style={{fontSize:12,fontWeight:600,color:"#fff"}}>{statusCounts[s]}</span>
              </div>;
            })}
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px 18px"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:10}}>Team Workload</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {personLoad.filter(p=>p.count>0).map(p=>(
              <div key={p.name} onClick={()=>setFP(filterPerson===p.name?"All":p.name)} className="chip" style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                <Avatar name={p.name} size={20}/>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.6)",width:52}}>{p.name}</span>
                <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:99,height:4,overflow:"hidden"}}>
                  <div style={{width:`${(p.count/20)*100}%`,maxWidth:"100%",height:"100%",background:TEAM_COLORS[p.name]||"#aaa",borderRadius:99,opacity:filterPerson===p.name?1:0.6}}/>
                </div>
                <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.4)",width:20,textAlign:"right"}}>{p.count}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:1,minWidth:180,position:"relative"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search projects, clients, team…"
            style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"7px 12px 7px 30px",color:"#fff",fontSize:13}}/>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.25)",fontSize:13}}>⌕</span>
        </div>
        {[{val:filterClient,set:setFC,opts:clients,lbl:"Clients"},{val:filterPerson,set:setFP,opts:people,lbl:"People"},{val:filterConsultant,set:setFCon,opts:consultants,lbl:"Consultants"},{val:filterStatus,set:setFS,opts:statuses,lbl:"Statuses"}].map((f,i)=>(
          <select key={i} value={f.val} onChange={e=>f.set(e.target.value)}
            style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"7px 12px",color:f.val==="All"?"rgba(255,255,255,0.4)":"#fff",fontSize:12,fontFamily:"'DM Mono',monospace",cursor:"pointer"}}>
            {f.opts.map(o=><option key={o} value={o} style={{background:"#1a1d24"}}>{o==="All"?`All ${f.lbl}`:o}</option>)}
          </select>
        ))}
        <div style={{display:"flex",gap:3}}>
          {["client","id","status","name"].map(s=>(
            <button key={s} onClick={()=>setSort(s)} style={{padding:"6px 10px",borderRadius:6,border:"1px solid",borderColor:sortBy===s?"#c8a96e":"rgba(255,255,255,0.08)",background:sortBy===s?"rgba(200,169,110,0.1)":"transparent",color:sortBy===s?"#c8a96e":"rgba(255,255,255,0.3)",fontSize:10,fontFamily:"'DM Mono',monospace",cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em"}}>{s}</button>
          ))}
        </div>
        <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>{filtered.length}/{pool.length}</span>
        <button onClick={()=>setFOB(!filterOverBudget)} style={{padding:"6px 12px",borderRadius:6,border:"1px solid",borderColor:filterOverBudget?"#e07b6a":"rgba(255,255,255,0.08)",background:filterOverBudget?"rgba(224,123,106,0.15)":"transparent",color:filterOverBudget?"#e07b6a":"rgba(255,255,255,0.3)",fontSize:10,fontFamily:"'DM Mono',monospace",cursor:"pointer",whiteSpace:"nowrap"}}>⚠ Over Budget{filterOverBudget?` (${overBudget.length})`:""}</button>
      </div>

{view !== "overbudget" && <React.Fragment>
            <div style={{display:"grid",gridTemplateColumns:"80px 100px 2.5fr 90px 130px 70px 140px",padding:"6px 12px",fontSize:10,letterSpacing:"0.12em",color:"rgba(255,255,255,0.22)",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <div>ID</div><div>Client</div><div>Project</div><div>Status</div><div>Team</div><div style={{textAlign:"center"}}>Ratio</div><div>Fee Tracking</div>
      </div>

      <div>
        {filtered.map(p=>{
          const isOpen = expanded===p.id+p.name;
          const clientColor = cc(p.client);
          const burnPct = p.contract && p.fees_used ? Math.round(p.fees_used/p.contract*100) : null;
          const isHourly = p.hourly;
          const over = p.contract && p.fees_used && (p.contract / p.fees_used) < 0.8;
          const hasPhase = false;
          return (
            <div key={p.id+p.name}>
              <div className="row" onClick={()=>setExpanded(isOpen?null:p.id+p.name)}
                style={{display:"grid",gridTemplateColumns:"80px 100px 2.5fr 90px 130px 70px 140px",padding:"10px 12px",borderRadius:8,alignItems:"center",background:isOpen?"rgba(200,169,110,0.05)":"transparent",borderBottom:"1px solid rgba(255,255,255,0.04)",transition:"background 0.15s"}}>
                <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.3)"}}>{p.id}</div>
                <div><span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:clientColor,background:clientColor+"18",padding:"2px 7px",borderRadius:4}}>{p.client}</span></div>
                <div>
                  <div style={{fontSize:13,fontWeight:500,lineHeight:1.3}}>{p.name}</div>
                  <PaceBadge project={p} />
                </div>
                <div><Badge status={p.status}/></div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {p.team.slice(0,4).map(t=><Avatar key={t} name={t} size={24}/>)}
                  {p.team.length>4&&<div style={{width:24,height:24,borderRadius:"50%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"rgba(255,255,255,0.4)"}}>+{p.team.length-4}</div>}
                </div>
                <div style={{fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"center"}}>
                  {isHourly ? (
                    <span style={{color:"rgba(255,255,255,0.4)",fontWeight:600}}>1.00</span>
                  ) : p.contract && p.fees_used ? (
                    <span style={{color:over?"#e07b6a":burnPct>=85?"#e8b84b":"#4caf7d",fontWeight:600}}>
                      {(p.contract/p.fees_used).toFixed(2)}
                    </span>
                  ) : <span style={{color:"rgba(255,255,255,0.2)"}}>—</span>}
                </div>
                <div>
                {(p.contract || p.fees_used) ? (
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,alignItems:"center"}}>
                        <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.5)"}}>
                          {fmt$(p.fees_used||0)}
                          {p.contract && <span style={{color:"rgba(255,255,255,0.25)"}}> / {fmt$(p.contract)}</span>}
                          {isHourly && <span style={{fontSize:9,color:"rgba(126,184,201,0.7)",marginLeft:4,fontFamily:"'DM Mono',monospace"}}>T&M</span>}
                        </span>
                        {!isHourly && burnPct!=null && <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:over?"#e07b6a":burnPct>=85?"#e8b84b":"#4caf7d"}}>{burnPct}%{over?" ⚠":""}</span>}
                      </div>
                      {!isHourly && p.contract && <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:3,overflow:"hidden"}}>
                        <div style={{width:`${Math.min(100,burnPct||0)}%`,height:"100%",background:over?"#e07b6a":burnPct>=85?"#e8b84b":"#4caf7d",borderRadius:99}}/>
                      </div>}
                    </div>
                  ) : (
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.18)",fontFamily:"'DM Mono',monospace"}}>no fee data</div>
                  )}
                </div>
              </div>

              {isOpen && (
                <div style={{margin:"0 8px 8px",padding:"20px",background:"rgba(255,255,255,0.025)",borderRadius:"0 0 12px 12px",border:"1px solid rgba(200,169,110,0.15)",borderTop:"none",animation:"fadeIn 0.2s ease"}}>
                  <div style={{display:"grid",gridTemplateColumns:"0.9fr 1.8fr 1fr 1fr",gap:16}}>
                    <div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:10}}>Project Details</div>
                      {[["No",p.id,"#fff"],["Client",p.client,clientColor],["Status",p.status,(STATUS_CFG[p.status]||{}).color||"#aaa"]].map(([l,v,c])=>(
                        <div key={l} style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:6}}>{l}: <span style={{color:c,fontWeight:500}}>{v}</span></div>
                      ))}
                      <div style={{marginTop:12}}>
                        <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:8}}>Team</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {p.team.map(t=>(
                            <div key={t} style={{display:"flex",alignItems:"center",gap:6}}>
                              <Avatar name={t} size={22}/>
                              <span style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>{t}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      {p.consultants&&p.consultants.length>0&&(
                        <div style={{marginTop:12}}>
                          <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:6}}>Consultants</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                            {p.consultants.map(c=>(
                              <span key={c} style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.5)",background:"rgba(255,255,255,0.06)",padding:"2px 8px",borderRadius:4}}>{c}</span>
                            ))}
                          </div>
                        </div>
                      )}
                      <MilestoneTimeline milestones={p.milestones}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:10}}>Fee by Phase</div>
                      {p.phases && p.phases.length > 0 ? (
                        <div style={{display:"flex",flexDirection:"column",gap:5}}>
                          {p.phases.map((ph,i) => {
                            const hasFee  = ph.c != null && ph.c > 0;
                            const hasUsed = ph.u != null && ph.u > 0;
                            const pct     = hasFee && hasUsed ? Math.min(100, Math.round(ph.u / ph.c * 100)) : null;
                            const over    = hasFee && hasUsed && ph.u > ph.c;
                            const color   = over ? "#e07b6a" : pct >= 85 ? "#e8b84b" : "#4caf7d";
                            const bdrClr  = over ? "rgba(224,123,106,0.5)" : pct >= 85 ? "rgba(232,184,75,0.4)" : "rgba(255,255,255,0.08)";
                            return (
                              <div key={i} style={{padding:"7px 10px",borderRadius:6,background:"rgba(255,255,255,0.025)",borderLeft:`2px solid ${bdrClr}`}}>
                                <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",fontFamily:"'DM Mono',monospace",lineHeight:1.4,marginBottom:4}}>
                                  {ph.t && <span style={{color:"#7eb8c9",fontSize:8,fontWeight:600,background:"rgba(126,184,201,0.15)",padding:"1px 4px",borderRadius:3,marginRight:5}}>T&M</span>}
                                  {ph.l}
                                </div>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:99,height:3,overflow:"hidden",display:hasFee?"block":"none"}}>
                                    <div style={{width:`${Math.min(100,pct||0)}%`,height:"100%",background:color,borderRadius:99}}/>
                                  </div>
                                  <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:"rgba(255,255,255,0.5)",whiteSpace:"nowrap",flexShrink:0,marginLeft:"auto"}}>
                                    {hasUsed ? `$${Math.round(ph.u).toLocaleString()}` : '—'}
                                    {hasFee && <span style={{color:"rgba(255,255,255,0.2)"}}> / ${Math.round(ph.c).toLocaleString()}</span>}
                                    {pct != null && <span style={{marginLeft:6,color,fontWeight:700}}>{pct}%{over?' ⚠':''}</span>}
                                  </span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      ) : (
                        <div style={{fontSize:12,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>No phase data in Big Time</div>
                      )}
                    </div>
                    <div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:10}}>Phase Schedule</div>
                      {p.milestones ? (() => {
                        const today = new Date();
                        const parseDate = s => {
                          if (!s) return null;
                          if (typeof s !== 'string') return s instanceof Date ? s : null;
                          s = s.replace(/\s*\([^)]*\)/g,'').replace(/(\d+\/\d+)-\d+(\/\d+)/,'$1$2').trim();
                          const parts = s.split('/');
                          if (parts.length < 3) return null;
                          try { const [mo,d,yr]=parts; return new Date(yr.length===2?`20${yr}`:yr,parseInt(mo)-1,parseInt(d)); } catch(e){return null;}
                        };
                        const fmtD = d => d ? d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}) : '—';
                        const labelRe = /\b(SD\/S1|DD\/S2|CD\/S3|CA\/S4|Stage\s*\d+[ab]?|ES|SD|DD|CD|CA|Closeout|ASAF|Permitting|Report|CDs?)\s*:/gi;
                        const dateRe  = /(\d{1,2}\/\d{1,2}(?:-\d+)?\/\d{2,4})/g;
                        const matches = [...p.milestones.matchAll(labelRe)];
                        if (!matches.length) return <div style={{fontSize:12,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>No phase dates entered</div>;
                        return (
                          <div style={{display:"flex",flexDirection:"column",gap:6}}>
                            {matches.map((lm,i) => {
                              const label   = lm[1].trim();
                              const segEnd  = i+1 < matches.length ? matches[i+1].index : p.milestones.length;
                              const seg     = p.milestones.slice(lm.index+lm[0].length, segEnd);
                              const dates   = [...seg.matchAll(dateRe)].map(m=>parseDate(m[1])).filter(Boolean);
                              const start   = dates[0]||null;
                              const end     = dates[1]||dates[0]||null;
                              const isActive  = start && end && today >= start && today <= end;
                              const isComplete= end && today > end;
                              const isPending = !end || today < (start||end);
                              const dotColor  = isActive ? "#e8b84b" : isComplete ? "#4caf7d" : "rgba(255,255,255,0.2)";
                              const textColor = isActive ? "rgba(255,255,255,0.9)" : isComplete ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.55)";
                              return (
                                <div key={i} style={{display:"grid",gridTemplateColumns:"10px 70px 1fr",alignItems:"center",gap:8}}>
                                  <div style={{width:8,height:8,borderRadius:"50%",background:dotColor,flexShrink:0}}/>
                                  <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:dotColor,fontWeight:isActive?600:400}}>{label}</span>
                                  <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:textColor}}>
                                    {start&&end&&start.getTime()!==end.getTime() ? `${fmtD(start)} – ${fmtD(end)}` : end ? fmtD(end) : <span style={{color:"rgba(255,255,255,0.2)"}}>TBD</span>}
                                    {isComplete && <span style={{marginLeft:6,fontSize:9,color:"#4caf7d"}}>✓</span>}
                                    {isActive && <span style={{marginLeft:6,fontSize:9,color:"#e8b84b"}}>● active</span>}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })() : <div style={{fontSize:12,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>No phase dates entered</div>}
                    </div>
                    <div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:10}}>Fee Summary</div>
                      {p.contract ? (
                        <div>
                          <FeeDonut totalContract={p.contract} totalFeesUsed={p.fees_used}/>
                          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:6}}>
                            {[["Contracted",p.contract,"rgba(255,255,255,0.6)"],["Used",p.fees_used,"#9e7ec8"],["Remaining",(p.contract||0)-(p.fees_used||0),(p.contract||0)-(p.fees_used||0)<0?"#e07b6a":"#4caf7d"]].map(([l,v,c])=>(
                              <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{l}</span>
                                <span style={{fontSize:13,fontFamily:"'DM Mono',monospace",fontWeight:500,color:c}}>{fmtFull$(v)}</span>
                              </div>
                            ))}
                          </div>
                          {over&&<div style={{marginTop:10,padding:"6px 10px",background:"rgba(224,123,106,0.1)",border:"1px solid rgba(224,123,106,0.25)",borderRadius:8,fontSize:11,color:"#e07b6a"}}>⚠ Fee used exceeds contracted amount by {fmtFull$((p.fees_used||0)-(p.contract||0))}</div>}
                        </div>
                      ) : (
                        <div style={{fontSize:12,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>No fee data entered yet</div>
                      )}
                    </div>
                    <div>
                      <HoursPanel totalContract={p.contract} totalFeesUsed={p.fees_used}/>
                    </div>
                  </div>
                  <PacePanel project={p} />
                </div>
              )}
            </div>
          );
        })}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"rgba(255,255,255,0.2)",fontFamily:"'DM Mono',monospace",fontSize:13}}>No projects match your filters</div>}
      </React.Fragment>}
      <div style={{marginTop:20,fontSize:10,color:"rgba(255,255,255,0.1)",fontFamily:"'DM Mono',monospace",textAlign:"center"}}>
        Click row to expand | BT synced 2026-04-05 | Dates from updated project sheet
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
